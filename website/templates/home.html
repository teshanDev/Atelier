{% extends "base.html" %}
{% block title %}Home{% endblock %}

{% block content %}
<h1 align="center">Sketches</h1>

<form method="POST" enctype="multipart/form-data">
    <label for="sketch_image">Upload a Sketch:</label>
    <input type="file" name="sketch_image" id="sketch_image" class="form-control" accept="image/*">
    <br/>
    <div align="center">
        <button type="submit" class="btn btn-primary">Submit</button>
    </div>
</form>

<hr>

<ul class="list-group" id="notes">
    {% for note in all_notes %}
    <li class="list-group-item">
        <strong>{{ note.user.first_name }}</strong> shared: <br>

        <img src="{{ url_for('static', filename='uploads/' + note.image_path) }}"
             style="max-width: 300px; border-radius: 10px; margin-top: 10px;">

        {% if note.user_id == current_user.id %}
        <button type="button" class="close" onclick="deleteNote({{ note.id }})">
            <span aria-hidden="true">&times;</span>
        </button>
        {% endif %}
    </li>
    {% endfor %}
</ul>
{% endblock %}
